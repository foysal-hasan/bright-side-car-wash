  #     POSTGRES_PASSWORD: root
  #     POSTGRES_DB: backend
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"


