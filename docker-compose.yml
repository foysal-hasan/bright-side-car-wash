services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: backend
    container_name: backend
    ports:
      - "4000:4000"
    env_file:
      - .env

    # volumes:
    #   - .:/usr/src/app
    #   - /usr/src/app/node_modules
    depends_on:
      - redis
      - postgres
    networks:
      - public_net
      - private_net
    # command: yarn start:dev-swc
    command: sh -c "npx prisma migrate deploy && yarn db:seed && yarn start:prod"

  postgres:
    image: postgres:latest
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: bright_side_car_wash
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - private_net

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - private_net


volumes:
  postgres_data:

networks:
  public_net:
    driver: bridge
  private_net:
    driver: bridge