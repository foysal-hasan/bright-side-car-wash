services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: backend
    container_name: backend
    ports:
      - "4000:4000"
    env_file:
      - .env

    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - redis
      # - postgres
    # command: yarn start:dev-swc

  # postgres:
  #   image: postgres:latest
  #   container_name: postgres
  #   ports:
